version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airdrop_manager_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://root:secure_airdrop_pass@mysql:3306/airdrop_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=super_secret_airdrop_token_jwt_2026_key
      - JWT_REFRESH_SECRET=super_secret_jwt_refresh_rotation_token_2026_key
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: airdrop_manager_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secure_airdrop_pass
      MYSQL_DATABASE: airdrop_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0-alpine
    container_name: airdrop_manager_queue_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
